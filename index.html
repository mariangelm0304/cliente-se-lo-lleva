<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tablero · Clientes Se Lo Lleva</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#0f172a; --ink-soft:#475569; --muted:#94a3b8; --line:#e2e8f0;
    --brand:#1f4e78; --brand-2:#2563eb;
    --ok:#10b981; --warn:#f59e0b; --danger:#ef4444;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f1f5f9;color:var(--ink)}
  header{background:linear-gradient(135deg,#0f172a 0%,#1f4e78 60%,#2563eb 100%);color:#fff;padding:22px 28px;box-shadow:0 6px 20px rgba(15,23,42,.15)}
  header h1{margin:0;font-size:22px;letter-spacing:.3px}
  header p{margin:4px 0 0;color:#cbd5e1;font-size:13px}
  .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{background:#fff;color:var(--brand);border:0;padding:9px 14px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 6px rgba(0,0,0,.1);transition:transform .1s, box-shadow .15s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.18)}
  .btn.ghost{background:rgba(255,255,255,.12);color:#fff;backdrop-filter:blur(6px)}
  .btn.ghost:hover{background:rgba(255,255,255,.22)}
  main{padding:22px 28px;max-width:1500px;margin:0 auto}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:18px}
  .kpi{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(15,23,42,.06);border-left:4px solid var(--brand-2)}
  .kpi.warn{border-left-color:var(--warn)}
  .kpi.danger{border-left-color:var(--danger)}
  .kpi.ok{border-left-color:var(--ok)}
  .kpi .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);font-weight:600}
  .kpi .val{font-size:28px;font-weight:700;margin-top:6px;color:var(--ink)}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:18px}
  @media (max-width: 1100px){ .grid{grid-template-columns:1fr} }
  .panel{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(15,23,42,.06)}
  .panel h3{margin:0 0 12px;font-size:14px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px}
  .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:14px}
  .filters .field{display:flex;flex-direction:column;gap:3px}
  .filters label{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .filters input, .filters select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;color:var(--ink);outline:none;width:100%}
  .filters input:focus, .filters select:focus{border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
  .filter-row2{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
  .btn.clear{background:#f1f5f9;color:var(--ink-soft);border:1px solid var(--line);font-size:12px;padding:6px 12px;box-shadow:none}
  .btn.clear:hover{background:#e2e8f0}
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
  thead th{background:#1f4e78;color:#fff;padding:10px 8px;text-align:left;font-weight:600;position:sticky;top:0;z-index:1;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px}
  tbody td{padding:8px;border-bottom:1px solid var(--line);color:var(--ink)}
  tbody tr:nth-child(even){background:#f8fafc}
  tbody tr:hover{background:#eff6ff}
  tbody tr.alert-row{background:#fef2f2 !important}
  tbody tr.alert-row:hover{background:#fee2e2 !important}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
  .badge.ok{background:#d1fae5;color:#065f46}
  .badge.warn{background:#fef3c7;color:#92400e}
  .badge.danger{background:#fee2e2;color:#991b1b}
  .tbl-wrap{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:8px}
  .empty{text-align:center;padding:30px;color:var(--muted)}
  .toast{position:fixed;bottom:24px;right:24px;background:#0f172a;color:#fff;padding:12px 18px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.25);font-size:13px;opacity:0;transform:translateY(20px);transition:all .25s;z-index:1000}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast.error{background:#991b1b}
  .toast.ok{background:#065f46}
  input[type=file]{display:none}
  .meta{font-size:11px;color:var(--muted)}
  .chart-box{position:relative;height:300px}
</style>
</head>
<body>
<header>
  <div class="topbar">
    <div>
      <h1>Tablero · Clientes Se Lo Lleva</h1>
      <p id="meta">Cargando datos…</p>
    </div>
    <div class="actions">
      <label class="btn ghost" for="fileXlsx">Importar Excel</label>
      <input id="fileXlsx" type="file" accept=".xlsx,.xls" />
      <label class="btn ghost" for="fileJson">Importar JSON</label>
      <input id="fileJson" type="file" accept=".json" />
      <button class="btn ghost" id="btnDownloadJson">Descargar JSON</button>
      <button class="btn" id="btnReload">Recargar data.json</button>
    </div>
  </div>
</header>

<main>
  <section class="kpis" id="kpis"></section>

  <section class="grid">
    <div class="panel">
      <h3>Entregas por tienda</h3>
      <div class="chart-box"><canvas id="chartTiendas"></canvas></div>
    </div>
    <div class="panel">
      <h3>Distribución por zona</h3>
      <div class="chart-box"><canvas id="chartZonas"></canvas></div>
    </div>
  </section>

  <section class="panel">
    <h3>Detalle de entregas</h3>
    <div class="filters">
      <div class="field">
        <label for="fSearch">Búsqueda libre</label>
        <input id="fSearch" placeholder="Nombre, ruta, transporte…" />
      </div>
      <div class="field">
        <label for="fTienda">Almacén / tienda</label>
        <select id="fTienda"><option value="">Todas las tiendas</option></select>
      </div>
      <div class="field">
        <label for="fZona">Zona</label>
        <select id="fZona"><option value="">Todas las zonas</option></select>
      </div>
      <div class="field">
        <label for="fRuta">Ruta de transporte</label>
        <select id="fRuta"><option value="">Todas las rutas</option></select>
      </div>
      <div class="field">
        <label for="fYear">Año</label>
        <select id="fYear"><option value="">Todos los años</option></select>
      </div>
      <div class="field">
        <label for="fMonth">Mes</label>
        <select id="fMonth">
          <option value="">Todos los meses</option>
          <option value="1">Enero</option><option value="2">Febrero</option>
          <option value="3">Marzo</option><option value="4">Abril</option>
          <option value="5">Mayo</option><option value="6">Junio</option>
          <option value="7">Julio</option><option value="8">Agosto</option>
          <option value="9">Septiembre</option><option value="10">Octubre</option>
          <option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
      </div>
      <div class="field">
        <label for="fDateField">Filtrar fecha por</label>
        <select id="fDateField">
          <option value="Fe.entrega">Fe. entrega</option>
          <option value="Fe.picking">Fe. picking</option>
        </select>
      </div>
      <div class="field">
        <label for="fAlert">Estado</label>
        <select id="fAlert">
          <option value="">Todos</option>
          <option value="alert">Solo alertas (&gt;15 días)</option>
          <option value="warn">Por vencer (8–15 días)</option>
          <option value="ok">Al día (≤7 días)</option>
        </select>
      </div>
    </div>
    <div class="filter-row2">
      <span class="meta" id="rowCount"></span>
      <button class="btn clear" id="btnClear">Limpiar filtros</button>
    </div>
    <div class="tbl-wrap">
      <table id="tbl">
        <thead><tr id="thead"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </section>
</main>

<div id="toast" class="toast"></div>

<script>
// === CATÁLOGO DE TIENDAS ============================================
const TIENDA_MAP = {
  3000: 'ALMACEN PRINCIPAL',
  3001: 'ALMACEN HIPER',
  3002: 'ALMACEN NORTE',
  3004: 'ALMACEN SANTA MARTA',
  3005: 'ALMACEN LA PLAZUELA',
  3006: 'ALMACEN CUATRO VIENTOS',
  3007: 'ALMACEN SAN FELIPE',
  3008: 'ALMACEN VALLEDUPAR NOV',
  3009: 'ALMACEN SINCELEJO',
  3010: 'ALMACEN RIOHACHA',
  3011: 'ALMACEN MONTERIA',
  3012: 'ALMACEN BUCARAMANGA',
  3013: 'ALMACEN PLAZA DEL SOL',
  3014: 'ALMACEN PIEDECUESTA',
  3015: 'ALMACEN MAYALES',
  3016: 'ALMACEN MEDELLIN',
  3017: 'ALMACEN LA 27',
  3018: 'ALMACEN LOS MOLINOS',
  3019: 'ALMACEN SUBA',
  3020: 'ALMACEN LA FLORIDA',
  3021: 'ALMACEN METROPOLITANO',
  3022: 'ALMACEN BOSA',
  3023: 'ALMACEN LAS AMERICAS',
  3024: 'E-COMMERCE COLOMBIA',
  3025: 'ALMACEN LA CENTRAL',
  3026: 'BODEGA TEMPORAL',
  3027: 'BUCARAMANGA CENTRO',
  3028: 'JAMAR PREMIUM PLAZA',
  3029: 'ALMACEN VALLEDUPAR',
  3030: 'ALMACEN JAMAR NORTE BOGOTA',
  3031: 'ALMACEN FABRICATO',
  3032: 'ALMACEN VILLAVICENCIO',
  3033: 'ALMACEN EL EDEN',
  3034: 'JAMAR CRA 30',
};
// ====================================================================

const STATE = { rows: [], columns: [], generatedAt: null, chartT: null, chartZ: null };
const DATE_COLS = ['Fe.picking','Fe.entrega'];
const BASE_COLUMNS = ['Transportes','y','entregas','StatusGlob','Entrg.ext.','Cl.entrega','Tienda','RutaTransp','Zona','Nombre','Fe.picking','Fe.entrega'];
const MONTH_NAMES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function toast(msg, kind){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (kind||'');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove('show'), 2800);
}

function parseDate(v){
  if(v==null||v==='') return null;
  if(v instanceof Date) return v;
  const s = String(v).trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
  if(m){ const y = +m[3] < 100 ? 2000+ +m[3] : +m[3]; return new Date(y, +m[2]-1, +m[1]); }
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function fmtDate(d){
  if(!d) return '';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}

function daysAgo(d){
  if(!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const t = new Date(d); t.setHours(0,0,0,0);
  return Math.floor((today - t)/86400000);
}

function rowStatus(r){
  let maxDays = -Infinity;
  for(const c of DATE_COLS){
    const d = parseDate(r[c]);
    if(d){
      const days = daysAgo(d);
      if(days > maxDays) maxDays = days;
    }
  }
  if(maxDays === -Infinity) return {label:'sin fecha', kind:'', days:null};
  if(maxDays > 15) return {label:`${maxDays} días`, kind:'danger', days:maxDays};
  if(maxDays >= 8) return {label:`${maxDays} días`, kind:'warn', days:maxDays};
  if(maxDays >= 0) return {label:`${maxDays} días`, kind:'ok', days:maxDays};
  return {label:`en ${-maxDays} días`, kind:'ok', days:maxDays};
}

function applyTiendaMap(rows){
  rows.forEach(r=>{
    const code = r['Cl.entrega'];
    const k = (code===null||code===undefined||code==='') ? null : parseInt(code,10);
    if(k!=null && !isNaN(k) && TIENDA_MAP[k]){
      r['Tienda'] = TIENDA_MAP[k];
    } else if(!r['Tienda']){
      r['Tienda'] = '';
    }
  });
  return rows;
}

function uniq(arr){ return [...new Set(arr.filter(x=>x!=null && x!==''))].sort(); }

function render(){
  document.getElementById('meta').textContent =
    `${STATE.rows.length} registros · ${Object.keys(TIENDA_MAP).length} tiendas en catálogo · Última carga: ${STATE.generatedAt ? new Date(STATE.generatedAt).toLocaleString('es-CO') : 'desconocida'}`;

  // Populate filter dropdowns
  const tSel = document.getElementById('fTienda');
  const zSel = document.getElementById('fZona');
  const rSel = document.getElementById('fRuta');
  const ySel = document.getElementById('fYear');
  const curT = tSel.value, curZ = zSel.value, curR = rSel.value, curY = ySel.value;
  tSel.innerHTML = '<option value="">Todas las tiendas</option>' + uniq(STATE.rows.map(r=>r['Tienda'])).map(v=>`<option ${v===curT?'selected':''}>${v}</option>`).join('');
  zSel.innerHTML = '<option value="">Todas las zonas</option>' + uniq(STATE.rows.map(r=>r['Zona'])).map(v=>`<option ${v===curZ?'selected':''}>${v}</option>`).join('');
  rSel.innerHTML = '<option value="">Todas las rutas</option>' + uniq(STATE.rows.map(r=>r['RutaTransp'])).map(v=>`<option ${v===curR?'selected':''}>${v}</option>`).join('');
  // Years from both date columns
  const years = new Set();
  STATE.rows.forEach(r=>{
    DATE_COLS.forEach(c=>{ const d=parseDate(r[c]); if(d) years.add(d.getFullYear()); });
  });
  const sortedYears = [...years].sort((a,b)=>b-a);
  ySel.innerHTML = '<option value="">Todos los años</option>' + sortedYears.map(y=>`<option ${String(y)===curY?'selected':''}>${y}</option>`).join('');

  renderKPIs();
  renderTable();
  renderCharts();
}

function renderKPIs(){
  const data = filtered();
  let alert=0, warn=0, ok=0, sinFecha=0, totalTiendas=new Set(), totalZonas=new Set();
  data.forEach(r=>{
    const s = rowStatus(r);
    if(s.kind==='danger') alert++;
    else if(s.kind==='warn') warn++;
    else if(s.kind==='ok') ok++;
    else sinFecha++;
    if(r['Tienda']) totalTiendas.add(r['Tienda']);
    if(r['Zona']) totalZonas.add(r['Zona']);
  });
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="lbl">Registros filtrados</div><div class="val">${data.length}</div><div class="sub">de ${STATE.rows.length} totales · ${totalTiendas.size} tiendas · ${totalZonas.size} zonas</div></div>
    <div class="kpi danger"><div class="lbl">Alertas (&gt;15 días)</div><div class="val">${alert}</div><div class="sub">requieren atención inmediata</div></div>
    <div class="kpi warn"><div class="lbl">Por vencer (8–15 días)</div><div class="val">${warn}</div><div class="sub">vigilar próximos días</div></div>
    <div class="kpi ok"><div class="lbl">Al día (≤7 días)</div><div class="val">${ok}</div><div class="sub">${sinFecha} sin fecha</div></div>
  `;
}

function filtered(){
  const q = document.getElementById('fSearch').value.trim().toLowerCase();
  const tFilter = document.getElementById('fTienda').value;
  const zFilter = document.getElementById('fZona').value;
  const rFilter = document.getElementById('fRuta').value;
  const yFilter = document.getElementById('fYear').value;
  const mFilter = document.getElementById('fMonth').value;
  const dField = document.getElementById('fDateField').value;
  const aFilter = document.getElementById('fAlert').value;
  return STATE.rows.filter(r=>{
    if(tFilter && r['Tienda']!==tFilter) return false;
    if(zFilter && r['Zona']!==zFilter) return false;
    if(rFilter && r['RutaTransp']!==rFilter) return false;
    if(yFilter || mFilter){
      const d = parseDate(r[dField]);
      if(!d) return false;
      if(yFilter && d.getFullYear()!==parseInt(yFilter,10)) return false;
      if(mFilter && (d.getMonth()+1)!==parseInt(mFilter,10)) return false;
    }
    if(aFilter){
      const k = rowStatus(r).kind;
      if(aFilter==='alert' && k!=='danger') return false;
      if(aFilter==='warn' && k!=='warn') return false;
      if(aFilter==='ok' && k!=='ok') return false;
    }
    if(q){
      const blob = Object.values(r).map(v=>v==null?'':String(v)).join(' ').toLowerCase();
      if(!blob.includes(q)) return false;
    }
    return true;
  });
}

function renderTable(){
  const cols = STATE.columns;
  document.getElementById('thead').innerHTML = cols.map(c=>`<th>${c}</th>`).join('') + '<th>Estado</th>';
  const rows = filtered();
  document.getElementById('rowCount').textContent = `${rows.length} de ${STATE.rows.length} registros`;
  const tb = document.getElementById('tbody');
  if(rows.length===0){
    tb.innerHTML = `<tr><td colspan="${cols.length+1}" class="empty">Sin resultados</td></tr>`;
    return;
  }
  tb.innerHTML = rows.map(r=>{
    const s = rowStatus(r);
    const tds = cols.map(c=>{
      let v = r[c];
      if(DATE_COLS.includes(c)){
        const d = parseDate(v);
        v = d ? fmtDate(d) : (v||'');
      }
      return `<td>${v==null?'':v}</td>`;
    }).join('');
    const badge = s.kind ? `<span class="badge ${s.kind==='danger'?'danger':s.kind==='warn'?'warn':'ok'}">${s.label}</span>` : '<span class="badge">—</span>';
    return `<tr class="${s.kind==='danger'?'alert-row':''}">${tds}<td>${badge}</td></tr>`;
  }).join('');
}

function renderCharts(){
  const data = filtered();
  const byT = {};
  data.forEach(r=>{ const k=r['Tienda']||'(sin)'; byT[k]=(byT[k]||0)+1; });
  const sortedT = Object.entries(byT).sort((a,b)=>b[1]-a[1]).slice(0,12);

  if(STATE.chartT) STATE.chartT.destroy();
  STATE.chartT = new Chart(document.getElementById('chartTiendas'),{
    type:'bar',
    data:{labels:sortedT.map(x=>x[0]),datasets:[{label:'Entregas',data:sortedT.map(x=>x[1]),backgroundColor:'#2563eb',borderRadius:6}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{precision:0}}}}
  });

  const byZ = {};
  data.forEach(r=>{ const k=r['Zona']||'(sin)'; byZ[k]=(byZ[k]||0)+1; });
  const sortedZ = Object.entries(byZ).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const palette = ['#2563eb','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#64748b'];

  if(STATE.chartZ) STATE.chartZ.destroy();
  STATE.chartZ = new Chart(document.getElementById('chartZonas'),{
    type:'doughnut',
    data:{labels:sortedZ.map(x=>x[0]),datasets:[{data:sortedZ.map(x=>x[1]),backgroundColor:palette,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}
  });
}

async function loadJsonFromServer(){
  try{
    const res = await fetch('data.json?_=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    applyPayload(json);
    toast('data.json cargado correctamente', 'ok');
  }catch(e){
    console.warn(e);
    toast('No se encontró data.json. Importa Excel o JSON manualmente.', 'error');
  }
}

function applyPayload(json){
  let rows = json.rows || [];
  rows = applyTiendaMap(rows);
  STATE.rows = rows;
  STATE.columns = (json.columns && json.columns.length) ? json.columns : (rows[0] ? Object.keys(rows[0]) : BASE_COLUMNS);
  STATE.generatedAt = json.generatedAt || new Date().toISOString();
  render();
}

function xlsxToPayload(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      try{
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const aoa = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false, dateNF:'yyyy-mm-dd'});
        if(!aoa.length){ resolve({generatedAt:new Date().toISOString(),columns:BASE_COLUMNS,rows:[]}); return; }
        const headerRow = aoa[0].map(h=>h==null?'':String(h).trim());
        const rows = [];
        for(let i=1;i<aoa.length;i++){
          const r = aoa[i]; if(!r) continue;
          const obj = {};
          headerRow.forEach((h,idx)=>{ obj[h] = r[idx]; });
          DATE_COLS.forEach(c=>{
            if(obj[c]){ const d = parseDate(obj[c]); if(d) obj[c] = d.toISOString().slice(0,10); }
          });
          if(Object.values(obj).every(v=>v==null || String(v).trim()==='')) continue;
          rows.push(obj);
        }
        const cols = rows[0] ? Object.keys(rows[0]) : BASE_COLUMNS;
        resolve({generatedAt:new Date().toISOString(), columns:cols, rows});
      }catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

document.getElementById('fileXlsx').addEventListener('change', async e=>{
  const f = e.target.files[0]; if(!f) return;
  try{
    const payload = await xlsxToPayload(f);
    applyPayload(payload);
    toast(`Excel importado: ${payload.rows.length} registros. Usa "Descargar JSON" para guardar en tu repo.`, 'ok');
  }catch(err){ console.error(err); toast('Error leyendo Excel: '+err.message, 'error'); }
  e.target.value='';
});

document.getElementById('fileJson').addEventListener('change', async e=>{
  const f = e.target.files[0]; if(!f) return;
  try{
    const txt = await f.text();
    const json = JSON.parse(txt);
    applyPayload(json);
    toast(`JSON importado: ${json.rows.length} registros.`, 'ok');
  }catch(err){ toast('Error leyendo JSON: '+err.message, 'error'); }
  e.target.value='';
});

document.getElementById('btnDownloadJson').addEventListener('click', ()=>{
  const payload = {generatedAt:new Date().toISOString(), columns:STATE.columns, rows:STATE.rows};
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'data.json'; a.click();
  URL.revokeObjectURL(url);
  toast('data.json descargado. Súbelo a tu repo para actualizar el tablero.', 'ok');
});

document.getElementById('btnReload').addEventListener('click', loadJsonFromServer);

document.getElementById('btnClear').addEventListener('click', ()=>{
  ['fSearch','fTienda','fZona','fRuta','fYear','fMonth','fAlert'].forEach(id=>{
    document.getElementById(id).value = '';
  });
  document.getElementById('fDateField').value = 'Fe.entrega';
  refresh();
});

function refresh(){ renderKPIs(); renderTable(); renderCharts(); }

['fSearch','fTienda','fZona','fRuta','fYear','fMonth','fDateField','fAlert'].forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('input', refresh);
  el.addEventListener('change', refresh);
});

loadJsonFromServer();
</script>
</body>
</html>
